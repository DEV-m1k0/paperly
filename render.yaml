# Render Blueprint — автоматически создаёт web-сервис + Postgres при импорте репозитория.
# Документация: https://render.com/docs/blueprint-spec
#
# Использование:
#   1. Залогиниться на render.com → New → Blueprint
#   2. Подключить GitHub-репозиторий
#   3. Render прочитает этот файл и развернёт всё автоматически
#   4. После — нужно только добавить email-креды в Environment Variables
#      в дашборде Render (SECRET_KEY Render сгенерирует сам).

services:
  # ── Web-сервис (Django) ──
  - type: web
    name: paperly
    runtime: python
    plan: free
    region: frankfurt            # ближе к Курску чем Oregon
    branch: master               # deploy-ветка (или main — на выбор)
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn paperly_backend.wsgi:application"
    autoDeploy: true             # push в master = пересборка

    envVars:
      # Обязательные — Render сгенерирует / заполнит сам:
      - key: SECRET_KEY
        generateValue: true      # Render создаст случайный 50+ символов

      - key: DATABASE_URL        # Render свяжет с БД paperly-db автоматически
        fromDatabase:
          name: paperly-db
          property: connectionString

      - key: PYTHON_VERSION
        value: "3.11.9"

      # Базовые — можно менять в dashboard:
      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "paperly.onrender.com,.onrender.com"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://paperly.onrender.com"

      # Media storage. For reliable images on Render, use an S3-compatible bucket.
      - key: USE_S3_MEDIA
        value: "False"
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_REGION_NAME
        value: "auto"
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false

      # Email — пропишите свои SMTP-креды в dashboard (sync: false → не в git)
      - key: EMAIL_HOST
        value: "smtp.yandex.ru"
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USE_SSL
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

# ── Postgres база ──
databases:
  - name: paperly-db
    plan: free                   # 256 MB, 90 дней; потом нужно переезжать
    region: frankfurt
    databaseName: paperly
    user: paperly_user
