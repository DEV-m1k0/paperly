{% extends "base.html" %}
{% load static %}

{% block title %}{{ site.site_name|default:"Paperly" }} — Новинки{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'css/new-arrivals.css' %}">
<link rel="stylesheet" href="{% static 'css/product-cards.css' %}">
{% endblock %}

{% block content %}
<div class="container page">
  <h1>Новинки</h1>
  <p class="lead">Свежие товары за последние 3 дня.</p>
  <section class="products" id="newArrivalsProducts" aria-live="polite">
    <p class="empty-state">Загрузка новинок...</p>
  </section>
</div>
{% endblock %}

{% block page_js %}
<script src="{% static 'js/new-arrivals.js' %}"></script>
{% endblock %}
